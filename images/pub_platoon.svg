<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-label="Cooperative platoon merging control">
  <defs>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3f7fc"/>
      <stop offset="1" stop-color="#e3ecf7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#g3)"/>
  <text x="400" y="80" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#012F63" text-anchor="middle">Cooperative Platoon Merging</text>
  <text x="400" y="124" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="24" fill="#1a4f8a" text-anchor="middle">Reinforcement Learning for Connected Vehicles</text>
  <!-- road -->
  <path d="M40 320 H760" stroke="#012F63" stroke-width="60" stroke-linecap="round" opacity="0.92"/>
  <path d="M40 320 H760" stroke="#ffffff" stroke-width="3" stroke-dasharray="26 22"/>
  <!-- platoon of cars -->
  <g fill="#FE667B">
    <rect x="120" y="302" width="62" height="34" rx="8"/>
    <rect x="210" y="302" width="62" height="34" rx="8"/>
    <rect x="300" y="302" width="62" height="34" rx="8"/>
  </g>
  <!-- merging car -->
  <rect x="470" y="240" width="62" height="34" rx="8" fill="#012F63"/>
  <path d="M500 276 C 500 300, 430 300, 392 314" stroke="#a29bfe" stroke-width="4" fill="none" stroke-dasharray="7 7" marker-end="url(#b)"/>
  <defs>
    <marker id="b" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#a29bfe"/>
    </marker>
  </defs>
  <!-- V2V links -->
  <path d="M151 295 C 181 270, 211 270, 241 295" stroke="#1a4f8a" stroke-width="3" fill="none" stroke-dasharray="5 5"/>
  <path d="M241 295 C 271 270, 301 270, 331 295" stroke="#1a4f8a" stroke-width="3" fill="none" stroke-dasharray="5 5"/>
  <circle cx="151" cy="295" r="6" fill="#1a4f8a"/>
  <circle cx="241" cy="295" r="6" fill="#1a4f8a"/>
  <circle cx="331" cy="295" r="6" fill="#1a4f8a"/>
</svg>
