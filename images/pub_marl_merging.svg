<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-label="Multi-agent reinforcement learning for highway merging">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3f7fc"/>
      <stop offset="1" stop-color="#e3ecf7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#g1)"/>
  <!-- main highway -->
  <path d="M40 330 H760" stroke="#012F63" stroke-width="56" stroke-linecap="round" opacity="0.92"/>
  <path d="M40 330 H760" stroke="#ffffff" stroke-width="3" stroke-dasharray="26 22"/>
  <!-- merging ramp -->
  <path d="M120 460 C 320 460, 360 360, 540 332" stroke="#1a4f8a" stroke-width="46" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- vehicles on highway -->
  <rect x="250" y="314" width="58" height="30" rx="7" fill="#FE667B"/>
  <rect x="430" y="314" width="58" height="30" rx="7" fill="#a29bfe"/>
  <rect x="600" y="314" width="58" height="30" rx="7" fill="#FE667B"/>
  <!-- merging vehicle -->
  <rect x="300" y="398" width="58" height="30" rx="7" fill="#012F63"/>
  <!-- agent connection arcs -->
  <path d="M279 300 C 330 250, 400 250, 459 300" stroke="#FE667B" stroke-width="3" fill="none" stroke-dasharray="6 6"/>
  <path d="M459 300 C 510 250, 580 250, 629 300" stroke="#a29bfe" stroke-width="3" fill="none" stroke-dasharray="6 6"/>
  <circle cx="279" cy="300" r="6" fill="#FE667B"/>
  <circle cx="459" cy="300" r="6" fill="#a29bfe"/>
  <circle cx="629" cy="300" r="6" fill="#FE667B"/>
  <text x="400" y="80" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#012F63" text-anchor="middle">Multi-Agent Reinforcement Learning</text>
  <text x="400" y="124" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="24" fill="#1a4f8a" text-anchor="middle">Highway Merging Control for Autonomous Vehicles</text>
</svg>
