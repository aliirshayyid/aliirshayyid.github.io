<!-- Accent enhancements: scroll-in animations + decorative top border -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Scroll-triggered fade-in for cards
  var observerOptions = { threshold: 0.1, rootMargin: '0px 0px -50px 0px' };
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) { entry.target.classList.add('animate'); }
    });
  }, observerOptions);
  document.querySelectorAll('.paper-box, .highlight-block').forEach(function(el) {
    el.classList.add('fade-in-up');
    observer.observe(el);
  });
  // Decorative gradient bar at the top of the page
  document.body.classList.add('accent-border-top');
});
</script>
